<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три слоя</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Manrope:wght@500;700;800&family=Unbounded:wght@700;800;900&display=swap');

  :root {
    --bg: #F2F0EB;
    --text: #1A1A1A;
    --text-muted: #3d3d3d;
    --text-dim: #6b6b6b;
    --accent: #B8470B;
    --surface: rgba(255,255,255,0.55);
    --border: rgba(0,0,0,0.08);
    --c1: #9E1A4640; --c2: #B8470B30; --c3: #E26A4A30; --c4: #D99A5B25; --c5: #C84C5525;
    --radius: 14px;
    --think: #4D7E84;
    --act: #B8470B;
    --expand: #6B6D9E;
    --center: #1A1A1A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 80px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }

  body::before {
    content: "";
    position: fixed;
    top: -20%; left: -20%; right: -20%; bottom: -20%;
    z-index: -1; pointer-events: none;
    background-image:
      radial-gradient(circle at 10% 10%, var(--c1) 0%, transparent 75%),
      radial-gradient(circle at 90% 10%, var(--c2) 0%, transparent 80%),
      radial-gradient(circle at 90% 90%, var(--c3) 0%, transparent 75%),
      radial-gradient(circle at 10% 90%, var(--c4) 0%, transparent 80%),
      radial-gradient(circle at 50% 50%, var(--c5) 0%, transparent 85%);
    filter: blur(80px);
    will-change: transform, opacity;
    animation: breathing 8s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
  }

  @keyframes breathing {
    0%   { transform: scale(1) translate(0%, 0%); opacity: 0.7; }
    100% { transform: scale(1.15) translate(-2%, 2%); opacity: 1; }
  }

  .container { max-width: 1100px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 32px; }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900; font-size: 2.4rem;
    line-height: 0.95; letter-spacing: -0.04em;
    text-transform: lowercase; color: var(--text);
    margin-bottom: 10px;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.12em;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 28px;
    align-items: start;
  }

  /* Venn diagram */
  .venn-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1.15;
  }

  .venn-circle {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .venn-circle:hover { transform: scale(1.03); }
  .venn-circle.active { transform: scale(1.05); }

  .circle-think {
    width: 62%; height: 54%;
    top: 2%; left: 5%;
    background: rgba(77, 126, 132, 0.15);
    border: 2px solid rgba(77, 126, 132, 0.35);
  }
  .circle-think.active { background: rgba(77, 126, 132, 0.25); border-color: var(--think); }

  .circle-act {
    width: 62%; height: 54%;
    top: 2%; right: 5%;
    background: rgba(184, 71, 11, 0.12);
    border: 2px solid rgba(184, 71, 11, 0.3);
  }
  .circle-act.active { background: rgba(184, 71, 11, 0.2); border-color: var(--act); }

  .circle-expand {
    width: 62%; height: 54%;
    bottom: 2%; left: 50%;
    transform: translateX(-50%);
    background: rgba(107, 109, 158, 0.13);
    border: 2px solid rgba(107, 109, 158, 0.3);
  }
  .circle-expand.active { background: rgba(107, 109, 158, 0.22); border-color: var(--expand); }
  .circle-expand:hover { transform: translateX(-50%) scale(1.03); }
  .circle-expand.active { transform: translateX(-50%) scale(1.05); }

  /* Labels on diagram */
  .venn-label {
    position: absolute;
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    letter-spacing: -0.02em;
    pointer-events: none;
    text-transform: lowercase;
    z-index: 5;
  }

  .label-think { top: 10%; left: 14%; color: var(--think); }
  .label-act { top: 10%; right: 14%; color: var(--act); }
  .label-expand { bottom: 8%; left: 50%; transform: translateX(-50%); color: var(--expand); }

  /* Intersection zones */
  .zone {
    position: absolute;
    cursor: pointer;
    z-index: 10;
    border-radius: 50%;
    transition: all 0.3s ease;
  }

  .zone:hover { background: rgba(0,0,0,0.05); }

  .zone-think-act {
    width: 18%; height: 22%;
    top: 14%; left: 50%;
    transform: translateX(-50%);
  }

  .zone-think-expand {
    width: 18%; height: 22%;
    bottom: 22%; left: 22%;
  }

  .zone-act-expand {
    width: 18%; height: 22%;
    bottom: 22%; right: 22%;
  }

  .zone-center {
    width: 14%; height: 17%;
    top: 36%; left: 50%;
    transform: translateX(-50%);
    z-index: 15;
  }

  .zone-center:hover { background: rgba(0,0,0,0.07); }

  /* Dot indicators */
  .zone-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    pointer-events: none;
  }

  .zone:hover .zone-dot, .zone.active .zone-dot {
    background: var(--accent);
    width: 10px; height: 10px;
  }

  .zone-center .zone-dot {
    width: 12px; height: 12px;
    background: rgba(0,0,0,0.3);
  }

  .zone-center:hover .zone-dot, .zone-center.active .zone-dot {
    background: var(--text);
    width: 14px; height: 14px;
  }

  /* Side panel */
  .panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    backdrop-filter: blur(12px);
    min-height: 420px;
    transition: all 0.4s ease;
  }

  .panel-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    transition: color 0.3s ease;
  }

  .panel-title {
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    text-transform: lowercase;
    margin-bottom: 16px;
    line-height: 1.1;
    transition: color 0.3s ease;
  }

  .panel-items {
    list-style: none;
  }

  .panel-items li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .panel-items li:last-child { border-bottom: none; }

  .panel-items li .example-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    display: block;
    margin-bottom: 2px;
  }

  .panel-hint {
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.5;
    padding-top: 20px;
  }

  .panel-hint .arrow {
    display: inline-block;
    margin-right: 6px;
    font-size: 1.1rem;
  }

  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .venn-wrap { max-width: 500px; margin: 0 auto; }
    h1 { font-size: 1.8rem; }
    body { padding: 24px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>три слоя</h1>
    <p class="subtitle">что ии может для вас · нажимайте на зоны</p>
  </header>

  <div class="layout">
    <div class="venn-wrap">
      <!-- Circles -->
      <div class="venn-circle circle-think" onclick="show('think')"></div>
      <div class="venn-circle circle-act" onclick="show('act')"></div>
      <div class="venn-circle circle-expand" onclick="show('expand')"></div>

      <!-- Labels -->
      <div class="venn-label label-think">мышление</div>
      <div class="venn-label label-act">действие</div>
      <div class="venn-label label-expand">расширение</div>

      <!-- Intersection zones -->
      <div class="zone zone-think-act" onclick="show('think-act')"><div class="zone-dot"></div></div>
      <div class="zone zone-think-expand" onclick="show('think-expand')"><div class="zone-dot"></div></div>
      <div class="zone zone-act-expand" onclick="show('act-expand')"><div class="zone-dot"></div></div>
      <div class="zone zone-center" onclick="show('center')"><div class="zone-dot"></div></div>
    </div>

    <div class="panel" id="panel">
      <div class="panel-hint">
        <span class="arrow">←</span> Нажмите на любой круг или пересечение, чтобы увидеть примеры
      </div>
    </div>
  </div>
</div>

<script>
const data = {
  think: {
    tag: 'слой 1',
    title: 'мышление',
    color: '#4D7E84',
    items: [
      { label: 'рисёрч', text: 'Быстрый обзор литературы по клиническому вопросу с DOI и критическим анализом' },
      { label: 'концептуализация', text: 'Организация данных клиента по категориям подхода — модель структурирует, решения мои' },
      { label: 'рефлексия', text: 'Обработка мыслей после сессии — от потока сознания к структурированному анализу' },
      { label: 'обучение', text: 'Загрузить книгу по подходу в NotebookLM, тренироваться в диалоге, проверять приверженность протоколу' },
      { label: 'супервизия', text: 'Прогон кейса через модель с жёстким промптом на конкретный подход' },
    ]
  },
  act: {
    tag: 'слой 2',
    title: 'действие',
    color: '#B8470B',
    items: [
      { label: 'упражнения', text: 'Адаптация практик под конкретного клиента — подход, фокус, длительность, тон' },
      { label: 'документы', text: 'Информированные согласия, тексты для сайта, шаблоны писем' },
      { label: 'опросники', text: 'PDF-опросник → Excel с формулами автоматического подсчёта' },
      { label: 'голосовые заметки', text: 'Наговорить мысли → расшифровка → структурированные записи' },
      { label: 'редактирование', text: 'Gemini прямо внутри Google Docs правит текст, пока вы над ним работаете' },
    ]
  },
  expand: {
    tag: 'слой 3',
    title: 'расширение',
    color: '#6B6D9E',
    items: [
      { label: 'изображения', text: 'Генерация визуалов для постов, карточек, материалов — с текстом на русском' },
      { label: 'видео', text: 'Создание видео из фотографий — для контента и терапевтических целей' },
      { label: 'код', text: 'Презентации на Slidev, интерактивные HTML-артефакты, сайт' },
      { label: '3D', text: 'Трёхмерные модели для презентаций и учебных материалов' },
      { label: 'новые форматы', text: 'Интерактивные учебные пособия, подкасты из материалов, аудио-практики' },
    ]
  },
  'think-act': {
    tag: 'мышление ∩ действие',
    title: 'думаю + получаю',
    color: '#8B6340',
    items: [
      { label: 'рисёрч → материал', text: 'Исследовал тему — тут же превратил в конспект, карточки, раздатку' },
      { label: 'адаптация под клиента', text: 'Клиническое мышление (что нужно этому клиенту) + быстрое исполнение (скрипт, PDF)' },
      { label: 'конспекты', text: 'Рефлексия после сессии → сразу готовые структурированные заметки' },
      { label: 'подготовка к сессии', text: 'Вспомнить подход + адаптировать скрипт + получить готовый материал за 10 минут' },
    ]
  },
  'act-expand': {
    tag: 'действие ∩ расширение',
    title: 'рутина + новый навык',
    color: '#926050',
    items: [
      { label: 'упражнение → PDF', text: 'Рутинная задача (оформить), но нужен дизайн, которого у меня нет' },
      { label: 'пост для Instagram', text: 'Контент-задача + генерация изображений с текстом через Gemini' },
      { label: 'опросник → таблица', text: 'Простое действие, но нужны формулы Excel, которых я не знаю' },
    ]
  },
  'think-expand': {
    tag: 'мышление ∩ расширение',
    title: 'идея + новая форма',
    color: '#5C7291',
    items: [
      { label: 'визуализация концептуализации', text: 'Клиническое мышление о клиенте → интерактивный HTML-артефакт, которого раньше не существовало' },
      { label: 'тренировка с книгой', text: 'Загрузить руководство → тренироваться с моделью → проверить себя на транскрипции' },
      { label: 'учебные материалы', text: 'Разобраться в теме → сразу создать интерактивное пособие для коллег или клиентов' },
    ]
  },
  center: {
    tag: 'центр · всё вместе',
    title: 'новая практика',
    color: '#1A1A1A',
    items: [
      { label: 'терапевтическое видео', text: 'Клиническое мышление (зачем, для кого) + исполнение (быстро) + навык (генерация видео). Инструмент, которого раньше не было' },
      { label: 'проект мечты', text: 'От рефлексии над идеей → через дизайн и код → к готовому продукту. Блог, курс, медиа-проект — то, что откладывали, потому что не знали как' },
      { label: 'эта лекция', text: 'Мышление (структура, контент) + действие (текст, материалы) + расширение (код презентации, интерактивные артефакты). Сделана вместе с ИИ' },
    ]
  }
};

let currentSection = null;

function show(key) {
  const d = data[key];
  
  // Reset all active states
  document.querySelectorAll('.venn-circle, .zone').forEach(el => el.classList.remove('active'));

  // Set active
  if (key === 'think') document.querySelector('.circle-think').classList.add('active');
  if (key === 'act') document.querySelector('.circle-act').classList.add('active');
  if (key === 'expand') document.querySelector('.circle-expand').classList.add('active');
  if (key === 'think-act') {
    document.querySelector('.zone-think-act').classList.add('active');
    document.querySelector('.circle-think').classList.add('active');
    document.querySelector('.circle-act').classList.add('active');
  }
  if (key === 'think-expand') {
    document.querySelector('.zone-think-expand').classList.add('active');
    document.querySelector('.circle-think').classList.add('active');
    document.querySelector('.circle-expand').classList.add('active');
  }
  if (key === 'act-expand') {
    document.querySelector('.zone-act-expand').classList.add('active');
    document.querySelector('.circle-act').classList.add('active');
    document.querySelector('.circle-expand').classList.add('active');
  }
  if (key === 'center') {
    document.querySelector('.zone-center').classList.add('active');
    document.querySelectorAll('.venn-circle').forEach(c => c.classList.add('active'));
  }

  // Build panel
  let html = `<div class="panel-tag" style="color:${d.color}">${d.tag}</div>`;
  html += `<div class="panel-title" style="color:${d.color}">${d.title}</div>`;
  html += '<ul class="panel-items">';
  d.items.forEach(item => {
    html += `<li><span class="example-label">${item.label}</span>${item.text}</li>`;
  });
  html += '</ul>';

  document.getElementById('panel').innerHTML = html;
  currentSection = key;
}
</script>

</body>
</html>
